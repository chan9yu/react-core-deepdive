<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="../css/common-style.css" />
		<script src="https://unpkg.com/lucide@latest"></script>
		<style>
			.slide-container {
				width: 100dvw;
				height: 100dvh;
				display: flex;
				flex-direction: column;
				justify-content: flex-start;
				align-items: center;
				padding: 80px;
				position: relative;
			}
			.qa-icon {
				color: var(--color-primary);
				margin-bottom: 48px;
			}
			.qa-heading {
				font-size: 4rem;
				font-weight: 700;
				margin-bottom: 32px;
				text-align: center;
			}
			.qa-subtext {
				font-size: 1.75rem;
				font-weight: 400;
				color: var(--color-text-tertiary);
				text-align: center;
				max-width: 700px;
				line-height: 1.5;
			}
			.abstract-elements {
				position: absolute;
				width: 100%;
				height: 100%;
				z-index: -1;
				overflow: hidden;
			}
			.circle {
				position: absolute;
				border: 2px solid var(--color-primary);
				border-radius: 50%;
				opacity: 0.1;
			}
			.circle-1 {
				width: 300px;
				height: 300px;
				right: -100px;
				top: -100px;
			}
			.circle-2 {
				width: 200px;
				height: 200px;
				left: -50px;
				bottom: -50px;
			}
			.circle-3 {
				width: 120px;
				height: 120px;
				right: 200px;
				bottom: 150px;
			}
			.rectangle {
				position: absolute;
				border: 2px solid var(--color-primary);
				opacity: 0.05;
			}
			.rectangle-1 {
				width: 250px;
				height: 120px;
				transform: rotate(-20deg);
				left: 200px;
				top: 100px;
			}
		</style>
	</head>
	<body>
		<div class="slide-container">
			<!-- Section Navigator -->
			<div class="section-nav">
				<span class="section-item">JSX Transpilation - JSX가 JavaScript로 변환되는 과정</span>
				<span class="section-item">Virtual DOM - 선언적 UI를 가능하게 하는 핵심 개념</span>
				<span class="section-item">Reconciliation - O(n³)에서 O(n)으로 최적화한 비교 알고리즘</span>
				<span class="section-item">얕은 비교와 불변성 - React가 선택한 트레이드오프</span>
				<span class="section-item active">Fiber Architecture - 더 나은 사용자 경험을 위한 새로운 엔진</span>
			</div>

			<div class="abstract-elements">
				<div class="circle circle-1"></div>
				<div class="circle circle-2"></div>
				<div class="circle circle-3"></div>
				<div class="rectangle rectangle-1"></div>
			</div>
			<i data-lucide="message-circle-question" class="qa-icon" width="80" height="80"></i>
			<h1 class="qa-heading">질문 있으신가요? 🙋</h1>
			<p class="qa-subtext">가장 궁금했던 부분부터 자유롭게!</p>
			<div class="page-number">23</div>
		</div>
		<script>
			lucide.createIcons();
		</script>
	</body>
</html>
