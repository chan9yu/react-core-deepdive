<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="../css/common-style.css" />
		<script src="https://unpkg.com/lucide@latest"></script>
		<style>
			.content-container {
				display: flex;
				flex-wrap: wrap;
				gap: 70px;
			}
			.section {
				flex: 1;
				min-width: 300px;
			}
			.section-title {
				font-size: 1.875rem;
				font-weight: 600;
				margin-bottom: 32px;
				color: var(--color-text);
				display: flex;
				align-items: center;
			}
			.section-icon {
				color: var(--color-primary);
				margin-right: 16px;
			}
			.checklist {
				display: flex;
				flex-direction: column;
				gap: 32px;
			}
			.checklist-item {
				display: flex;
				align-items: flex-start;
				font-size: 1.375rem;
				font-weight: 400;
			}
			.item-icon {
				color: var(--color-primary);
				flex-shrink: 0;
				margin-right: 16px;
				margin-top: 4px;
			}
		</style>
	</head>
	<body>
		<div class="slide-container">
			<div class="header">
				<!-- Section Navigator -->
				<div class="section-nav">
					<span class="section-item">JSX Transpilation - JSX가 JavaScript로 변환되는 과정</span>
					<span class="section-item">Virtual DOM - 선언적 UI를 가능하게 하는 핵심 개념</span>
					<span class="section-item">Reconciliation - O(n³)에서 O(n)으로 최적화한 비교 알고리즘</span>
					<span class="section-item">얕은 비교와 불변성 - React가 선택한 트레이드오프</span>
					<span class="section-item active">Fiber Architecture - 더 나은 사용자 경험을 위한 새로운 엔진</span>
				</div>
				<h1 class="title">실무 활용</h1>
			</div>
			<div class="content-container">
				<div class="section">
					<h2 class="section-title">
						<i data-lucide="lightbulb" class="section-icon" width="28" height="28"></i>
						기술적 이해
					</h2>
					<div class="checklist">
						<div class="checklist-item">
							<i data-lucide="check-circle" class="item-icon" width="24" height="24"></i>
							<p>설계 결정과 트레이드오프</p>
						</div>
					</div>
				</div>
				<div class="section">
					<h2 class="section-title">
						<i data-lucide="search" class="section-icon" width="28" height="28"></i>
						개발 관점
					</h2>
					<div class="checklist">
						<div class="checklist-item">
							<i data-lucide="check-circle" class="item-icon" width="24" height="24"></i>
							<p>"왜?"를 먼저 생각하기</p>
						</div>
					</div>
				</div>
				<div class="section">
					<h2 class="section-title">
						<i data-lucide="wrench" class="section-icon" width="28" height="28"></i>
						문제 해결
					</h2>
					<div class="checklist">
						<div class="checklist-item">
							<i data-lucide="check-circle" class="item-icon" width="24" height="24"></i>
							<p>주요 이슈의 근본 원인 파악</p>
						</div>
					</div>
				</div>
			</div>
			<div class="page-number">21</div>
		</div>
		<script>
			lucide.createIcons();
		</script>
	</body>
</html>
