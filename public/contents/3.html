<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="../css/common-style.css" />
		<script src="https://unpkg.com/lucide@latest"></script>
		<style>
			/* Slide-specific styles */
			.content {
				display: flex;
				flex-direction: column;
				gap: 50px;
			}
			.code-box {
				background-color: var(--color-code-bg);
				border-left: 4px solid var(--color-primary);
				padding: 28px 80px 28px 40px;
				border-radius: 8px;
				max-width: 600px;
				width: fit-content;
				height: fit-content;
			}
			.code-text {
				font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Code", monospace;
				font-size: 1.25rem;
				white-space: pre-wrap;
				color: var(--color-text-secondary);
				line-height: 1.6;
			}
			.emphasis {
				font-size: 2.25rem;
				font-weight: 500;
				color: var(--color-text);
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.question {
				color: var(--color-primary);
				font-size: 2.5rem;
			}
		</style>
	</head>
	<body>
		<div class="slide-container">
			<div class="header">
				<!-- Section Navigator -->
				<div class="section-nav">
					<span class="section-item active">JSX Transpilation - JSX가 JavaScript로 변환되는 과정</span>
					<span class="section-item">Virtual DOM - 선언적 UI를 가능하게 하는 핵심 개념</span>
					<span class="section-item">Reconciliation - O(n³)에서 O(n)으로 최적화한 비교 알고리즘</span>
					<span class="section-item">얕은 비교와 불변성 - React가 선택한 트레이드오프</span>
					<span class="section-item">Fiber Architecture - 더 나은 사용자 경험을 위한 새로운 엔진</span>
				</div>
				<h1 class="title">JSX를 처음 봤을 때</h1>
			</div>
			<div class="content">
				<div class="code-box">
					<pre class="code-text">function HelloWorld() {
  return &lt;h1&gt;Hello, World!&lt;/h1&gt;;
}</pre>
				</div>
				<div class="emphasis">
					<p>이게... JavaScript??</p>
					<span class="question">🤔</span>
				</div>
			</div>
			<div class="page-number">3</div>
		</div>
		<script>
			lucide.createIcons();
		</script>
	</body>
</html>
