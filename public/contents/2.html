<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="../css/common-style.css" />
		<script src="https://unpkg.com/lucide@latest"></script>
		<style>
			.checklist {
				display: flex;
				flex-direction: column;
				gap: 32px;
			}
			.checklist-item {
				display: flex;
				align-items: center;
				font-size: 1.75rem;
				font-weight: 400;
			}
			.icon {
				color: var(--color-primary);
				margin-right: 24px;
				flex-shrink: 0;
			}
		</style>
	</head>
	<body>
		<div class="slide-container">
			<div class="header">
				<h1 class="title">오늘의 목표</h1>
			</div>
			<div class="checklist">
				<div class="checklist-item">
					<i data-lucide="check-circle" class="icon" width="32" height="32"></i>
					<p>JSX Transpilation - JSX가 JavaScript로 변환되는 과정</p>
				</div>
				<div class="checklist-item">
					<i data-lucide="check-circle" class="icon" width="32" height="32"></i>
					<p>Virtual DOM - 선언적 UI를 가능하게 하는 핵심 개념</p>
				</div>
				<div class="checklist-item">
					<i data-lucide="check-circle" class="icon" width="32" height="32"></i>
					<p>Reconciliation - O(n³)에서 O(n)으로 최적화한 비교 알고리즘</p>
				</div>
				<div class="checklist-item">
					<i data-lucide="check-circle" class="icon" width="32" height="32"></i>
					<p>얕은 비교와 불변성 - React가 선택한 트레이드오프</p>
				</div>
				<div class="checklist-item">
					<i data-lucide="check-circle" class="icon" width="32" height="32"></i>
					<p>Fiber Architecture - 더 나은 사용자 경험을 위한 새로운 엔진</p>
				</div>
			</div>
			<div class="page-number">2</div>
		</div>
		<script>
			lucide.createIcons();
		</script>
	</body>
</html>
